name: Build, Test and Upload

# Add concurrency to prevent multiple deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [release, main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/**"
  pull_request:
    branches: [release, main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/**"

jobs:
  build-and-test:
    name: 🧪 Tests & 📤 Script Upload
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint Check
      - name: Run ESLint
        run: |
          echo "Running lint checks..."
          if ! pnpm lint-staged; then
            echo "Lint failed. Please fix the issues above."
            exit 1
          fi

      # Type Check for changed files
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            apps/**/*.{ts,tsx}
            packages/**/*.{ts,tsx}

      - name: Type Check Changed Files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Type checking changed files:"
          echo "$CHANGED_FILES"
          # Run tsc in each workspace that has changes
          if echo "$CHANGED_FILES" | grep -q "^apps/"; then
            echo "Checking apps..."
            pnpm --filter "./apps/*" tsc --noEmit
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/"; then
            echo "Checking packages..."
            pnpm --filter "./packages/*" tsc --noEmit
          fi

      # Unit Tests
      - name: Run Core Package Tests
        working-directory: packages/core
        run: pnpm test

      - name: Run Agent App Tests
        working-directory: apps/agent
        env:
          VITE_BASE_API_URL: ${{ github.ref == 'refs/heads/release' && secrets.PROD_BASE_API_URL || secrets.STAGING_BASE_API_URL }}
          VITE_WEBSOCKET_URL: ${{ github.ref == 'refs/heads/release' && secrets.PROD_WEBSOCKET_URL || secrets.STAGING_WEBSOCKET_URL }}
          VITE_SENTRY_DSN: ${{ github.ref == 'refs/heads/release' && secrets.PROD_SENTRY_DSN || secrets.STAGING_SENTRY_DSN }}
          VITE_SENTRY_AUTH_TOKEN: ${{ github.ref == 'refs/heads/release' && secrets.PROD_SENTRY_AUTH_TOKEN || secrets.STAGING_SENTRY_AUTH_TOKEN }}
          VITE_LOGROCKET_APP_ID: ${{ github.ref == 'refs/heads/release' && secrets.PROD_LOGROCKET_APP_ID || secrets.STAGING_LOGROCKET_APP_ID }}
          VITE_APP_ENV: ${{ github.ref == 'refs/heads/release' && 'production' || 'staging' }}
        run: pnpm test

      # Playwright E2E Tests
      - name: Check if E2E should run
        id: check_e2e
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if echo "$PR_LABELS" | grep -q "run-e2e"; then
              echo "run=true" >> $GITHUB_OUTPUT
              echo "E2E tests will run - 'run-e2e' label detected"
            else
              echo "run=false" >> $GITHUB_OUTPUT
              echo "E2E tests will not run - 'run-e2e' label not found"
            fi
          elif [[ "${{ github.event_name }}" == "push" && "${{ contains(github.event.head_commit.message, '#') }}" == "true" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "E2E tests will run - '#' found in commit message"
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "E2E tests will not run - not a PR with 'run-e2e' label or push with '#'"
          fi

      - name: Cache Playwright browsers
        if: steps.check_e2e.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.check_e2e.outputs.run == 'true'
        working-directory: apps/agent
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        if: steps.check_e2e.outputs.run == 'true'
        working-directory: apps/agent
        run: pnpm exec playwright test
        continue-on-error: false

      - name: Upload Playwright report
        if: steps.check_e2e.outputs.run == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/agent/playwright-report/
          retention-days: 30

      # Script upload steps
      - name: Check for script changes
        id: check_changes
        run: |
          changes=$(git diff --name-only HEAD^ HEAD | grep -E "^(apps/scripts|packages/core)/" || true)
          if [ ! -z "$changes" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changed files in scripts/core:"
            echo "$changes"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes in scripts/core"
          fi

      - name: Build scripts
        if: steps.check_changes.outputs.changes == 'true'
        working-directory: apps/scripts
        run: |
          if ! pnpm build; then
            echo "Build failed"
            exit 1
          fi

      - name: Configure AWS credentials
        if: steps.check_changes.outputs.changes == 'true'
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::381491968321:role/DjangoBackendCIRole
          aws-region: us-west-1

      - name: Upload scripts to S3
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH="${{ github.event.pull_request.base.ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [ "$BRANCH" == "release" ]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="staging"
          fi

          echo "Uploading scripts to S3..."
          aws s3 sync apps/scripts/build s3://frontendscripts/${ENVIRONMENT}

          if [ $? -eq 0 ]; then
            echo "Scripts uploaded to S3 for ${ENVIRONMENT} environment."
          else
            echo "Failed to upload scripts to S3."
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: '❌ Workflow failed! Please check the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.'
            })

      - name: Send Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "🚨 Workflow failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Workflow Failed* ❌\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Workflow:* ${{ github.workflow }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

permissions:
  contents: read
  pull-requests: read
  id-token: write
