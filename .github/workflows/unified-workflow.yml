name: Build, Test and Upload

# Add concurrency to prevent multiple deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [release, main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/**"
  pull_request:
    branches: [release, main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/**"

jobs:
  build-and-test:
    name: 🧪 Tests & 📤 Script Upload
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint Check
      - name: Run ESLint
        run: |
          echo "Running lint checks..."
          if ! pnpm lint-staged; then
            echo "Lint failed. Please fix the issues above."
            exit 1
          fi

      # Unit Tests
      - name: Run Core Package Tests
        working-directory: packages/core
        run: pnpm test

      - name: Run Agent App Tests
        working-directory: apps/agent
        env:
          VITE_BASE_API_URL: ${{ github.ref == 'refs/heads/release' && secrets.PROD_BASE_API_URL || secrets.STAGING_BASE_API_URL }}
          VITE_WEBSOCKET_URL: ${{ github.ref == 'refs/heads/release' && secrets.PROD_WEBSOCKET_URL || secrets.STAGING_WEBSOCKET_URL }}
          VITE_SENTRY_DSN: ${{ github.ref == 'refs/heads/release' && secrets.PROD_SENTRY_DSN || secrets.STAGING_SENTRY_DSN }}
          VITE_SENTRY_AUTH_TOKEN: ${{ github.ref == 'refs/heads/release' && secrets.PROD_SENTRY_AUTH_TOKEN || secrets.STAGING_SENTRY_AUTH_TOKEN }}
          VITE_LOGROCKET_APP_ID: ${{ github.ref == 'refs/heads/release' && secrets.PROD_LOGROCKET_APP_ID || secrets.STAGING_LOGROCKET_APP_ID }}
          VITE_APP_ENV: ${{ github.ref == 'refs/heads/release' && 'production' || 'staging' }}
        run: pnpm test

      # Playwright E2E Tests
      - name: Check if E2E should run
        id: check_e2e
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ contains(github.event.pull_request.labels.*.name, 'run-e2e') }}" == "true" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ contains(github.event.head_commit.message, 'Squash and merge') }}" == "true" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache Playwright browsers
        if: steps.check_e2e.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.check_e2e.outputs.run == 'true'
        working-directory: apps/agent
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        if: steps.check_e2e.outputs.run == 'true'
        working-directory: apps/agent
        run: pnpm exec playwright test
        continue-on-error: false

      - name: Upload Playwright report
        if: steps.check_e2e.outputs.run == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/agent/playwright-report/
          retention-days: 30

      # Script upload steps
      - name: Check for script changes
        id: check_changes
        run: |
          changes=$(git diff --name-only HEAD^ HEAD | grep -E "^(apps/scripts|packages/core)/" || true)
          if [ ! -z "$changes" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changed files in scripts/core:"
            echo "$changes"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes in scripts/core"
          fi

      - name: Build scripts
        if: steps.check_changes.outputs.changes == 'true'
        working-directory: apps/scripts
        run: |
          if ! pnpm build; then
            echo "Build failed"
            exit 1
          fi

      - name: Configure AWS credentials
        if: steps.check_changes.outputs.changes == 'true'
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Upload scripts to S3
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH="${{ github.event.pull_request.base.ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [ "$BRANCH" == "release" ]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="staging"
          fi

          echo "Uploading scripts to S3..."
          aws s3 sync apps/scripts/build s3://frontendscripts/${ENVIRONMENT}

          if [ $? -eq 0 ]; then
            echo "Scripts uploaded to S3 for ${ENVIRONMENT} environment."
          else
            echo "Failed to upload scripts to S3."
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: '❌ Workflow failed! Please check the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.'
            })
