name: Upload scripts to S3

on:
  push:
    branches:
      - release
      - main
    paths:
      - "apps/scripts/**"
      - "packages/core/**"
  pull_request:
    branches:
      - release
      - main
    paths:
      - "apps/scripts/**"
      - "packages/core/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changes
        id: check_changes
        run: |
          git diff --name-only HEAD^ HEAD | grep -E "^(apps/scripts|packages/core)/" && echo "changes=true" >> $GITHUB_OUTPUT || echo "changes=false" >> $GITHUB_OUTPUT

      - name: Build scripts
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          cd apps/scripts
          pnpm build

      - name: Configure AWS credentials
        if: steps.check_changes.outputs.changes == 'true'
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Determine branch, upload embed and communication scripts to S3
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH="${{ github.event.pull_request.base.ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [ "$BRANCH" == "release" ]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="staging"
          fi


          echo "Uploading scripts to S3..."
          aws s3 sync apps/scripts/build s3://frontendscripts/${ENVIRONMENT}

          if [ $? -eq 0 ]; then
            echo "Scripts uploaded to S3 for ${ENVIRONMENT} environment."
          else
            echo "Failed to upload scripts to S3."
            exit 1
          fi
